<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LAN Drop</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="titlebar">
        <div class="brand">
          <div class="app-icon" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <p class="eyebrow">LAN Drop</p>
            <h1>Android 和 Mac 的局域网快传</h1>
          </div>
        </div>
        <button id="refreshBtn" class="toolbar-btn" type="button">刷新状态</button>
      </section>

      <section class="status-panel" aria-label="当前状态">
        <div class="status-main">
          <span class="live-dot" aria-hidden="true"></span>
          <div>
            <p class="status-label">当前状态</p>
            <strong id="authBadge">检测中</strong>
          </div>
        </div>
        <div class="status-grid">
          <div class="status-item">
            <span>连接地址</span>
            <button id="baseUrlBtn" class="copy-address" type="button">加载中</button>
          </div>
          <div class="status-item">
            <span>访问码</span>
            <strong id="accessCode">加载中</strong>
          </div>
          <div class="status-item wide">
            <span>保存到</span>
            <strong id="uploadDir">加载中</strong>
          </div>
        </div>
        <button id="openUploadDirBtn" class="secondary-btn" type="button">打开保存文件夹</button>
      </section>

      <section class="transfer-grid">
        <article class="transfer-card receive-card">
          <header class="card-head">
            <div>
              <p class="card-kicker">Receive</p>
              <h2>收文件到 Mac</h2>
            </div>
            <span id="recentCount" class="count-pill">0</span>
          </header>

          <div class="receive-state">
            <span class="drop-icon" aria-hidden="true">↓</span>
            <span class="drop-title">正在等待手机发送</span>
            <span class="drop-subtitle">手机端选择照片、视频或文件，点“直接发送到 Mac”。发送完成后，文件会自动出现在下面。</span>
            <div class="receive-hint">
              <span class="live-dot small" aria-hidden="true"></span>
              <strong>接收服务已开启</strong>
            </div>
          </div>

          <section class="mini-section">
            <div class="mini-head">
              <h3>最近收到</h3>
              <span>收到后自动刷新</span>
            </div>
            <div id="filesList" class="files-list empty">还没有收到文件</div>
          </section>
        </article>

        <article class="transfer-card send-card" id="from-mac">
          <header class="card-head">
            <div>
              <p class="card-kicker">Send</p>
              <h2>发文件到手机</h2>
            </div>
            <span id="phoneFileCount" class="count-pill">0</span>
          </header>

          <label class="phone-picker" id="phoneDropzone">
            <input id="phoneFileInput" type="file" multiple />
            <span class="drop-icon" aria-hidden="true">↑</span>
            <span class="drop-title">选择 Mac 上的文件</span>
            <span class="drop-subtitle">选好后会出现在手机 App 的“Mac 发来的文件”里，点接收即可保存。</span>
          </label>

          <div id="phonePickedFiles" class="picked-files empty">还没有选择要发给手机的文件</div>
          <button id="shareToPhoneBtn" class="primary-btn" type="button" disabled>发送给手机接收</button>
          <div id="phoneShareResult" class="result-card" hidden></div>

          <section class="mini-section">
            <div class="mini-head">
              <h3>等待手机接收</h3>
              <span>手机接收后可在这里移除</span>
            </div>
            <div id="phoneFilesList" class="files-list empty">还没有可接收文件</div>
          </section>
        </article>
      </section>
    </main>

    <dialog id="authDialog" class="auth-dialog">
      <form method="dialog" class="auth-card" id="authForm">
        <h2>输入访问码</h2>
        <p>为了避免同一个网络下别人误传，第一次进入要输一下访问码。</p>
        <input id="codeInput" class="code-input" type="text" inputmode="numeric" maxlength="6" placeholder="6位数字" />
        <div class="auth-actions">
          <button class="toolbar-btn" value="cancel" type="submit">取消</button>
          <button id="unlockBtn" class="primary-btn" value="default" type="submit">进入</button>
        </div>
        <p id="authError" class="error-text" hidden>访问码不对，再试一次。</p>
      </form>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
